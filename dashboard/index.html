/* ─────────────────────────────── API UTILITIES ─────────────────────────────── */
const API_BASE = "http://localhost:8000";

const apiFetch = async (path, options = {}) => {
  const token = localStorage.getItem("lf_token");
  const res = await fetch(`${API_BASE}${path}`, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      ...(token ? { "Authorization": `Bearer ${token}` } : {}),
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || "Request failed");
  }
  return res.status === 204 ? null : res.json();
};

  industry: l.industry,

  status:   l.status,
  date:     l.created_at ? new Date(l.created_at).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" }) : "",
  notes:    l.notes,

/* ─────────────────────────────── CHART PLACEHOLDER ─────────────────────────────── */
const BarChart = ({ bars, color = "bg-blue-500", title, subtitle, isRep = false }) => {
  const max = Math.max(...bars.map(b => isRep ? b.rep : b.admin));
  return (
    <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex flex-col gap-4">
      <div className="flex items-start justify-between">
        <div>
          <p className="font-semibold text-slate-800">{title}</p>
          <p className="text-xs text-slate-500 mt-0.5">{subtitle}</p>
        </div>
        <span className="text-xs bg-blue-50 text-blue-600 font-semibold px-2 py-1 rounded-lg">This Week</span>
      </div>
      <div className="flex items-end gap-2 h-32 chart-grid rounded-xl p-3">
        {bars.map(b => {
          const val = isRep ? b.rep : b.admin;
          const pct = Math.round((val / max) * 100);
          return (
            <div key={b.label} className="flex flex-col items-center gap-1 flex-1">
              <span className="text-xs text-slate-500 font-medium">{val}</span>
              <div className="w-full flex flex-col justify-end" style={{height: "72px"}}>
                <div className={`${color} rounded-t-md chart-bar opacity-80 hover:opacity-100`}
                     style={{height: `${pct}%`}} />
              </div>
              <span className="text-xs text-slate-400">{b.label}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
};

const DonutChart = ({ data, title, subtitle }) => {
  const total = data.reduce((s, d) => s + d.value, 0);
  let offset = 0;
  const r = 40, cx = 56, cy = 56;
  const circ = 2 * Math.PI * r;
  return (
    <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex flex-col gap-4">
      <div>
        <p className="font-semibold text-slate-800">{title}</p>
        <p className="text-xs text-slate-500 mt-0.5">{subtitle}</p>
      </div>
      <div className="flex items-center gap-6">
        <div className="relative flex-shrink-0">
          <svg width="112" height="112" viewBox="0 0 112 112">
            {data.map((d, i) => {
              const dash = (d.value / total) * circ;
              const gap = circ - dash;
              const seg = (
                <circle key={i} cx={cx} cy={cy} r={r} fill="none"
                  stroke={d.color} strokeWidth="14"
                  strokeDasharray={`${dash} ${gap}`}
                  strokeDashoffset={-offset}
                  transform={`rotate(-90 ${cx} ${cy})`}
                  style={{transition: "stroke-dasharray 0.5s"}} />
              );
              offset += dash;
              return seg;
            })}
            <circle cx={cx} cy={cy} r="28" fill="white" />
            <text x={cx} y={cy - 4} textAnchor="middle" fontSize="13" fontWeight="700" fill="#0f172a">{total}</text>
            <text x={cx} y={cy + 10} textAnchor="middle" fontSize="8" fill="#94a3b8">TOTAL</text>
          </svg>
        </div>
        <div className="flex flex-col gap-2 flex-1">
          {data.map((d, i) => (
            <div key={i} className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{backgroundColor: d.color}} />
                <span className="text-xs text-slate-600">{d.label}</span>
              </div>
              <span className="text-xs font-semibold text-slate-700">{d.value}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ─────────────────────────────── TOP BAR ─────────────────────────────── */
const TopBar = ({ title, user, onLogout }) => {
  const [showMenu, setShowMenu] = useState(false);
  const menuRef = useRef(null);
  useEffect(() => {
    const handler = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setShowMenu(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);
  return (
    <header className="h-14 bg-white border-b border-slate-100 flex items-center px-6 gap-4 flex-shrink-0">
      <div className="flex-1">
        <h1 className="text-sm font-semibold text-slate-800">{title}</h1>
      </div>
      <div className="flex items-center gap-3">
        {/* Notifications */}
        <button className="relative text-slate-500 hover:text-slate-800 transition-colors">
          <Icon name="bell" className="w-5 h-5" />
          <span className="absolute -top-0.5 -right-0.5 w-2 h-2 bg-blue-600 rounded-full" />
        </button>
        {/* User dropdown */}
        <div className="relative" ref={menuRef}>
          <button onClick={() => setShowMenu(p => !p)} className="flex items-center gap-2 group">
            <Avatar initials={user.avatar} color={user.color} size="w-8 h-8" text="text-xs" />
            <div className="hidden md:block text-left">
              <p className="text-xs font-semibold text-slate-800 leading-none">{user.name}</p>
              <p className="text-xs text-slate-400 mt-0.5">{user.role}</p>
            </div>
            <Icon name="chevronRight" className={`w-3.5 h-3.5 text-slate-400 hidden md:block transition-transform ${showMenu ? "-rotate-90" : "rotate-90"}`} />
          </button>
          {showMenu && (
            <div className="absolute right-0 top-full mt-2 w-52 bg-white border border-slate-200 rounded-xl shadow-xl py-1 z-50">
              <div className="px-4 py-3 border-b border-slate-100">

                <p className="text-xs text-slate-400 mt-0.5">{user.role}</p>
              </div>

                <Icon name="logout" className="w-4 h-4" /> Sign out

    </header>
  );
};

/* ─── Admin Dashboard ─── */
const AdminDashboard = () => {
  const [openReps, setOpenReps] = useState({});
  const [byRep, setByRep] = useState([]);
  const [loading, setLoading] = useState(true);
  const [inviteCode, setInviteCode] = useState("");
  const [inviteCopied, setInviteCopied] = useState(false);
  const toggleRep = (name) => setOpenReps(p => ({ ...p, [name]: !p[name] }));

  useEffect(() => {
    Promise.all([
      apiFetch("/api/leads/by-rep").catch(() => []),
      apiFetch("/api/org").catch(() => null),
    ]).then(([reps, org]) => {
      setByRep(reps || []);
      if (org?.invite_code) setInviteCode(org.invite_code);
    }).finally(() => setLoading(false));
  }, []);

    { label: "Contacted",      color: "#3b82f6", value: byRep.reduce((s,r) => s+(r["Contacted"]||0), 0) },
    { label: "Responded",      color: "#f59e0b", value: byRep.reduce((s,r) => s+(r["Responded"]||0), 0) },
    { label: "Converted",      color: "#10b981", value: byRep.reduce((s,r) => s+(r["Converted"]||0), 0) },
    { label: "Not Interested", color: "#f87171", value: byRep.reduce((s,r) => s+(r["Not Interested"]||0), 0) },

  return (
    <div className="p-6 space-y-6">

        <div className="bg-gradient-to-r from-blue-600 to-violet-600 rounded-2xl p-5 flex items-center justify-between gap-4 text-white">

            <span className="font-mono text-xl font-bold tracking-widest bg-white/15 px-4 py-2 rounded-xl">{inviteCode}</span>
            <button onClick={copyInvite}
              className={`text-sm font-semibold px-4 py-2 rounded-xl transition-colors ${inviteCopied ? "bg-emerald-400 text-white" : "bg-white text-blue-700 hover:bg-blue-50"}`}>
              {inviteCopied ? "Copied!" : "Copy code"}
            </button>
          </div>
        </div>
      )}

      {/* Stats */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <StatCard label="Total Leads"     value={totalLeads}     icon="list"     iconBg="bg-blue-50 text-blue-600"     />
        <StatCard label="Active Reps"     value={byRep.length}   icon="users"    iconBg="bg-violet-50 text-violet-600"  />
        <StatCard label="Conversion Rate" value={`${convRate}%`} icon="trending" iconBg="bg-emerald-50 text-emerald-600" />
        <StatCard label="Converted"       value={totalConverted} icon="check"    iconBg="bg-amber-50 text-amber-600"    />
      </div>

      {/* Charts */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {donutData.length > 0
          ? <DonutChart data={donutData} title="Lead Status Breakdown" subtitle={`Across all ${totalLeads} leads`} />
          : <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex flex-col items-center justify-center gap-2 min-h-[180px]">
              <Icon name="list" className="w-8 h-8 text-slate-200" />
              <p className="text-sm font-medium text-slate-400">No leads yet</p>
              <p className="text-xs text-slate-300">Leads will appear here once your reps start adding them</p>
            </div>
        }
        {donutData.length > 0
          ? <DonutChart data={donutData} title="Rep Performance" subtitle={`${byRep.length} active reps`} />
          : <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex flex-col items-center justify-center gap-2 min-h-[180px]">
              <Icon name="users" className="w-8 h-8 text-slate-200" />
              <p className="text-sm font-medium text-slate-400">No rep activity yet</p>
              <p className="text-xs text-slate-300">Invite reps to your team to see performance here</p>
            </div>
        }
      </div>

      {/* Rep Performance */}
      {byRep.length > 0 && (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100">
          <div className="p-5 border-b border-slate-100">
            <SectionHeader title="Rep Performance" subtitle="Top reps by leads this month" action="View all reps" />
          </div>
          <div className="p-5 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
            {byRep.slice(0, 4).map((rep, i) => {
              const conv = rep.total ? Math.round(((rep["Converted"]||0) / rep.total) * 100) : 0;
              return (
                <div key={rep.id} className="border border-slate-100 rounded-xl p-4 hover:border-blue-200 transition-colors">
                  <div className="flex items-center gap-2 mb-3">
                    <Avatar initials={repInitials(rep.name)} color={repColor(i)} size="w-8 h-8" text="text-xs" />
                    <div>
                      <p className="text-xs font-semibold text-slate-800 leading-none">{rep.name}</p>
                      <p className="text-xs text-slate-400 mt-0.5">Sales Rep</p>
                    </div>
                  </div>
                  <div className="space-y-1">
                    <div className="flex justify-between text-xs"><span className="text-slate-500">Leads</span><span className="font-semibold text-slate-700">{rep.total}</span></div>
                    <div className="flex justify-between text-xs"><span className="text-slate-500">Converted</span><span className="font-semibold text-emerald-600">{rep["Converted"]||0}</span></div>
                    <div className="w-full bg-slate-100 rounded-full h-1.5 mt-2">
                      <div className="bg-blue-500 h-1.5 rounded-full" style={{width:`${conv}%`}} />
                    </div>
                    <p className="text-xs text-slate-400 text-right">{conv}% rate</p>
                  </div>
                </div>
              );

          </div>
        </div>
      )}

      {/* Leads by Rep Accordion */}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100">
        <div className="p-5 border-b border-slate-100 flex items-center justify-between">
          <div>
            <h2 className="font-semibold text-slate-800">Leads by Rep</h2>
            <p className="text-xs text-slate-500 mt-0.5">Click a rep to expand and view their leads</p>

          <button className="flex items-center gap-1.5 text-xs font-medium text-slate-600 border border-slate-200 rounded-lg px-3 py-1.5 hover:bg-slate-50">
            <Icon name="download" className="w-3.5 h-3.5" /> Export

        </div>
        {loading ? (
          <div className="px-5 py-8 text-center text-sm text-slate-400">Loading…</div>
        ) : (
          <div className="divide-y divide-slate-100">
            {byRep.map((rep, i) => {
              const conv = rep.total ? Math.round(((rep["Converted"]||0) / rep.total) * 100) : 0;
              const isOpen = !!openReps[rep.name];
              const repLeads = (rep.leads || []).map(normLead);
              return (
                <div key={rep.id}>
                  <button onClick={() => toggleRep(rep.name)}
                    className="w-full flex items-center gap-3 px-5 py-3.5 hover:bg-slate-50 transition-colors text-left">

                      <div className="hidden sm:flex items-center gap-3 text-xs">
                        <span className="text-slate-500">{rep.total} leads</span>

                          <span className="text-slate-400">{conv}%</span>

                      {rep.total > 0 && <span className="bg-blue-50 text-blue-600 text-xs font-bold px-2 py-0.5 rounded-full">{rep.total}</span>}

                  {isOpen && (
                    <div className="border-t border-slate-100 bg-slate-50/40">
                      {repLeads.length > 0

};

/* ─── Admin Sales Reps ─── */
const AdminSalesReps = () => {
  const [reps, setReps]         = useState([]);
  const [pending, setPending]   = useState([]);
  const [loading, setLoading]   = useState(true);
  const [actioning, setActioning] = useState({});

  useEffect(() => {
    Promise.all([
      apiFetch("/api/reps").catch(() => []),
      apiFetch("/api/org/pending").catch(() => []),
    ]).then(([r, p]) => { setReps(r); setPending(p); }).finally(() => setLoading(false));
  }, []);

  const action = async (userId, type) => {
    setActioning(a => ({ ...a, [userId]: type }));
    try {
      await apiFetch(`/api/org/members/${userId}/${type}`, { method: "POST" });
      setPending(p => p.filter(u => u.id !== userId));
      if (type === "approve") {
        const approved = pending.find(u => u.id === userId);
        if (approved) setReps(r => [...r, { ...approved, total_leads: 0, status: "active" }]);
      }
    } catch (err) {
      alert("Failed: " + err.message);
    } finally {
      setActioning(a => ({ ...a, [userId]: null }));
    }
  };

  if (loading) return <div className="p-6 text-sm text-slate-400">Loading…</div>;

  return (
    <div className="p-6 space-y-6">
      <div>
        <h2 className="text-xl font-bold text-slate-800">Sales Reps</h2>
        <p className="text-sm text-slate-500 mt-1">{reps.length} active rep{reps.length !== 1 ? "s" : ""} on your team</p>
      </div>

      {/* Pending approvals */}
      {pending.length > 0 && (
        <div className="bg-amber-50 border border-amber-200 rounded-2xl overflow-hidden">
          <div className="px-5 py-4 border-b border-amber-200 flex items-center gap-2">
            <div className="w-2 h-2 bg-amber-500 rounded-full animate-pulse" />
            <h3 className="font-semibold text-amber-800 text-sm">Pending Approval ({pending.length})</h3>
            <p className="text-xs text-amber-600 ml-1">These reps signed up with your invite code and are waiting for your approval</p>
          </div>
          <div className="divide-y divide-amber-100">
            {pending.map(u => (
              <div key={u.id} className="px-5 py-4 flex items-center justify-between gap-4">
                <div className="flex items-center gap-3">
                  <Avatar initials={repInitials(u.name)} color="bg-amber-500" size="w-9 h-9" text="text-xs" />
                  <div>
                    <p className="text-sm font-semibold text-slate-800">{u.name}</p>
                    <p className="text-xs text-slate-500">{u.email}</p>
                    <p className="text-xs text-amber-600 mt-0.5">Requested {new Date(u.created_at).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" })}</p>
                  </div>
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                  <button onClick={() => action(u.id, "approve")} disabled={!!actioning[u.id]}
                    className="text-xs font-semibold px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl transition-colors disabled:opacity-60">
                    {actioning[u.id] === "approve" ? "Approving…" : "Approve"}
                  </button>
                  <button onClick={() => action(u.id, "reject")} disabled={!!actioning[u.id]}
                    className="text-xs font-semibold px-4 py-2 bg-white hover:bg-red-50 text-red-600 border border-red-200 rounded-xl transition-colors disabled:opacity-60">
                    {actioning[u.id] === "reject" ? "Rejecting…" : "Reject"}
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Active reps */}
      {reps.length === 0 ? (
        <div className="bg-white rounded-2xl border border-slate-100 p-10 text-center">
          <Icon name="users" className="w-10 h-10 text-slate-200 mx-auto mb-3" />
          <p className="text-sm font-medium text-slate-400">No active reps yet</p>
          <p className="text-xs text-slate-300 mt-1">Share your invite code with reps — they'll appear here once you approve them</p>
        </div>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
          {reps.map((rep, i) => {
            const converted = rep["Converted"] || 0;
            const conv = rep.total_leads ? Math.round((converted / rep.total_leads) * 100) : 0;
            return (
              <div key={rep.id} className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 hover:shadow-md hover:border-slate-200 transition-all">
                <div className="flex items-start justify-between mb-4">
                  <div className="flex items-center gap-3">
                    <Avatar initials={repInitials(rep.name)} color={repColor(i)} size="w-10 h-10" text="text-sm" />
                    <div>
                      <p className="font-semibold text-slate-800 text-sm leading-none">{rep.name}</p>
                      <p className="text-xs text-slate-400 mt-1">Sales Rep</p>
                    </div>
                  </div>
                  <span className="text-xs bg-emerald-50 text-emerald-600 font-semibold px-2 py-0.5 rounded-full">Active</span>
                </div>
                <div className="grid grid-cols-3 gap-2 mb-4">
                  <div className="text-center"><p className="text-lg font-bold text-slate-800">{rep.total_leads || 0}</p><p className="text-xs text-slate-400">Leads</p></div>
                  <div className="text-center border-x border-slate-100"><p className="text-lg font-bold text-emerald-600">{converted}</p><p className="text-xs text-slate-400">Won</p></div>

                </div>
                <p className="text-xs text-slate-500 mt-2">{rep.email}</p>
              </div>
            );
          })}
        </div>
      )}

};

/* ─── Admin All Leads ─── */
const AdminAllLeads = () => {

  const [groupByRep, setGroupByRep] = useState(true);
  const [search, setSearch]   = useState("");

  useEffect(() => {
    apiFetch("/api/leads").then(data => setLeads(data.map(normLead))).catch(() => {}).finally(() => setLoading(false));
  }, []);

  const filtered = leads.filter(l => {
    if (filter !== "All" && l.status !== filter) return false;
    if (search && !l.company.toLowerCase().includes(search.toLowerCase()) &&
        !l.contact.toLowerCase().includes(search.toLowerCase()) &&
        !l.email.toLowerCase().includes(search.toLowerCase())) return false;

  });
  const repNames = [...new Set(leads.map(l => l.rep))].filter(Boolean);

  return (

          <Icon name="download" className="w-4 h-4" /> Export CSV
        </button>
      </div>

      <div className="flex flex-wrap items-center gap-2">
        {["All", ...STATUSES].map(s => (
          <button key={s} onClick={() => setFilter(s)}
            className={`text-xs font-medium px-3 py-1.5 rounded-lg border transition-colors ${
              filter === s ? "bg-blue-600 text-white border-blue-600" : "bg-white text-slate-600 border-slate-200 hover:border-slate-300"
            }`}>{s}</button>
        ))}
        <button onClick={() => setGroupByRep(g => !g)}

            groupByRep ? "bg-slate-800 text-white border-slate-800" : "bg-white text-slate-600 border-slate-200 hover:border-slate-300"
          }`}>
          <Icon name="users" className="w-3.5 h-3.5" /> Group by Rep

      <div className="bg-white rounded-2xl shadow-sm border border-slate-100">
        <div className="p-4 border-b border-slate-100 flex items-center gap-3">
          <div className="flex-1 flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">
            <Icon name="search" className="w-4 h-4 text-slate-400" />
            <input value={search} onChange={e => setSearch(e.target.value)}
              className="bg-transparent text-sm text-slate-600 placeholder:text-slate-400 outline-none flex-1"
              placeholder="Search by company, contact, email..." />
          </div>
        </div>

        {loading ? (
          <div className="px-5 py-8 text-center text-sm text-slate-400">Loading…</div>
        ) : groupByRep ? (
          <div className="divide-y divide-slate-100">
            {repNames.map((repName, i) => {
              const repLeads = filtered.filter(l => l.rep === repName);
              if (!repLeads.length) return null;
              return (
                <div key={repName}>
                  <div className="flex items-center gap-2.5 px-5 py-2.5 bg-slate-50 border-b border-slate-100">
                    <Avatar initials={repInitials(repName)} color={repColor(i)} size="w-6 h-6" text="text-xs" />
                    <span className="text-xs font-semibold text-slate-700">{repName}</span>
                    <span className="ml-auto text-xs font-semibold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">
                      {repLeads.length} lead{repLeads.length !== 1 ? "s" : ""}
                    </span>
                  </div>
                  <LeadsTable leads={repLeads} showRep={false} />
                </div>
              );
            })}
          </div>
        ) : (
          <LeadsTable leads={filtered} showRep={true} />

        <div className="px-5 py-3 border-t border-slate-100">
          <p className="text-xs text-slate-500">Showing {filtered.length} of {leads.length} leads</p>
        </div>
      </div>
    </div>
  );
};

/* ─── Admin Settings ─── */
const AdminSettings = () => {

  const [searchCx, setSearchCx]  = useState("");
  const [showKey, setShowKey]     = useState(false);
  const [copied, setCopied]       = useState(false);

  useEffect(() => {
    apiFetch("/api/org")
      .then(data => {
        setOrg(data);
        if (data) {
          setOrgName(data.name || "");
          setApiKey(data.google_api_key || "");
          setSearchCx(data.google_search_cx || "");
        }
      })
      .catch(() => {})
      .finally(() => setLoading(false));
  }, []);

  const save = async () => {
    setSaving(true); setSaveMsg("");
    try {
      const updated = await apiFetch("/api/org", {
        method: "PUT",
        body: JSON.stringify({ name: orgName, google_api_key: apiKey, google_search_cx: searchCx }),
      });
      setOrg(updated);
      setSaveMsg("Saved!");
    } catch (err) {
      setSaveMsg("Error: " + err.message);
    } finally { setSaving(false); setTimeout(() => setSaveMsg(""), 3000); }
  };

    navigator.clipboard.writeText(org?.invite_code || "");
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };

  if (loading) return <div className="p-6 text-sm text-slate-400">Loading settings…</div>;

  const usedPct = org ? Math.round((org.scrapes_used_this_month / (org.monthly_scrape_limit || 100)) * 100) : 0;

  return (
    <div className="p-6 max-w-2xl space-y-6">
      <div>
        <h2 className="text-xl font-bold text-slate-800">Organization Settings</h2>
        <p className="text-sm text-slate-500 mt-1">Manage your team and API configuration</p>
      </div>

      {/* Org info */}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

          <div className="px-5 py-4 flex items-center justify-between">
            <label className="text-sm text-slate-700 font-medium">Team Name</label>
            <input value={orgName} onChange={e => setOrgName(e.target.value)}
              className="text-sm text-slate-700 border border-slate-200 rounded-lg px-3 py-1.5 w-56 outline-none focus:border-blue-400" />
          </div>
          <div className="px-5 py-4">
            <div className="flex items-start justify-between mb-2">
              <div>
                <p className="text-sm text-slate-700 font-medium">Invite Code</p>
                <p className="text-xs text-slate-400 mt-0.5">Share with reps so they can join your team. Regenerate to invalidate the old one.</p>

            </div>
            <div className="flex items-center gap-2 mt-2">
              <span className="font-mono text-sm font-bold text-slate-800 bg-slate-100 px-3 py-2 rounded-lg tracking-widest flex-1 text-center">{org?.invite_code || "—"}</span>
              <button onClick={copyInvite}
                className={`text-xs font-semibold px-3 py-2 rounded-lg transition-colors flex-shrink-0 ${copied ? "bg-emerald-100 text-emerald-600" : "bg-blue-50 text-blue-600 hover:bg-blue-100"}`}>
                {copied ? "Copied!" : "Copy"}

      </div>
    </div>
  );
};

      {/* Search bar */}
      <div className="flex items-center gap-2 bg-white border border-slate-200 rounded-xl px-3 py-2 shadow-sm">

      </div>

      {/* Leads table */}
      {groups.map(group => (
        <div key={group.key} className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          {groupBySearch && (
            <div className="px-5 py-3 border-b border-slate-100 bg-slate-50/60 flex items-center justify-between">
              <div>
                <p className="text-sm font-semibold text-slate-700">{group.key}</p>
                <p className="text-xs text-slate-400 mt-0.5">{group.leads[0]?.searchDate} · {group.leads.length} lead{group.leads.length !== 1 ? "s" : ""}</p>
              </div>
            </div>
          )}
          <table className="w-full text-left min-w-[700px]">
            <thead>
              <tr className="border-b border-slate-100">
                <th className="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Company</th>
                <th className="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Industry</th>
                <th className="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Weaknesses</th>
                <th className="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">City</th>
                <th className="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Size</th>
                <th className="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Contact</th>
                <th className="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Status</th>
                <th className="px-4 py-3" />
              </tr>
            </thead>
            <tbody>
              {group.leads.length === 0
                ? <tr><td colSpan={8} className="px-4 py-8 text-center text-sm text-slate-400">No leads match your filters.</td></tr>
                : group.leads.map(lead => <LeadRow key={lead.id} lead={lead} />)
              }
            </tbody>
          </table>
          <div className="px-5 py-3 border-t border-slate-100">
            <p className="text-xs text-slate-400">Showing {group.leads.length} lead{group.leads.length !== 1 ? "s" : ""}</p>
          </div>
        </div>
      ))}
    </div>
  );
};

/* ─── Rep Search Leads ─── */
const RepSearchLeads = ({ user = {} }) => {
  const [phase, setPhase] = useState("form");
  const [progress, setProgress] = useState(0);
  const [progressStep, setProgressStep] = useState(0);
  const [savedLeads, setSavedLeads] = useState(new Set());
  const [selectedLeads, setSelectedLeads] = useState(new Set());
  const [scrapeError, setScrapeError] = useState("");
  const [orgChecked, setOrgChecked] = useState(false);
  const [hasOrg, setHasOrg] = useState(false);

  useEffect(() => {
    apiFetch("/api/org")
      .then(org => { setHasOrg(!!org); setOrgChecked(true); })
      .catch(() => { setHasOrg(false); setOrgChecked(true); });
  }, []);

  // Section 1
  const [industryInput, setIndustryInput] = useState("");
  const [showDropdown, setShowDropdown] = useState(false);
  const [location, setLocation] = useState("");
  const [radius, setRadius] = useState("25km");

  // Section 2
  const [criteria, setCriteria] = useState({});

  // Section 3
  const [phoneReq, setPhoneReq] = useState("preferred");
  const [emailReq, setEmailReq] = useState("preferred");
  const [wantWebsite, setWantWebsite] = useState(true);
  const [wantOwner, setWantOwner] = useState(false);

  // Section 4
  const [quantity, setQuantity] = useState(25);
  const [companySize, setCompanySize] = useState("any");

  const INDUSTRIES = [
    "Roofing","Plumbing","HVAC","Landscaping","Electrical",
    "Cleaning Services","Construction","Real Estate","Restaurants",
    "Dental / Medical","Auto Repair","Legal Services","Accounting",
    "Fitness / Gym","Salon / Spa","IT Services","Marketing Agency",
    "Pest Control","Moving Services","Photography","Insurance",
  ];

  const filteredIndustries = industryInput.trim()
    ? INDUSTRIES.filter(i => i.toLowerCase().includes(industryInput.toLowerCase()))
    : INDUSTRIES;

  const CRITERIA_OPTIONS = [
    { id: "bad_website",  label: "Bad or outdated website"          },
    { id: "no_website",   label: "No website at all"                },
    { id: "low_reviews",  label: "Low or no Google reviews"         },
    { id: "no_social",    label: "No social media presence"         },
    { id: "no_booking",   label: "No online booking system"         },
    { id: "no_ads",       label: "Not running Google Ads"           },
    { id: "poor_seo",     label: "Poor SEO / not ranking on Google" },
  ];

  const PROGRESS_STEPS = [
    "Searching Google Maps…",
    "Scanning business listings…",
    "Scraping websites…",
    "Extracting contact info…",
    "Filtering by criteria…",
    "Done!",
  ];

  const [results, setResults] = useState([]);

  if (!orgChecked) return <div className="p-6 text-sm text-slate-400">Loading…</div>;
  if (!hasOrg) return (
    <div className="p-6 max-w-lg">
      <div className="bg-amber-50 border border-amber-200 rounded-2xl p-6 text-center">
        <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-3">
          <Icon name="building" className="w-6 h-6 text-amber-600" />
        </div>
        <h3 className="font-semibold text-slate-800 mb-1">No organization linked</h3>

      </div>
    </div>
  );

  const canSearch = industryInput.trim() && location.trim();

  const startScraping = async () => {
    setPhase("scraping");
    setProgress(0);
    setProgressStep(0);
    setSavedLeads(new Set());
    setSelectedLeads(new Set());

    // Animate progress bar while API call runs in background
    let p = 0;
    const iv = setInterval(() => {
      p = Math.min(p + Math.random() * 5 + 2, 90);
      setProgress(Math.round(p));
      setProgressStep(Math.min(Math.floor(p / 20), PROGRESS_STEPS.length - 2));
    }, 200);

    try {
      const data = await apiFetch("/api/scrape", {
        method: "POST",
        body: JSON.stringify({
          industry:    industryInput.trim(),
          location:    location.trim(),
          radius,
          criteria,
          phone_req:   phoneReq,
          email_req:   emailReq,
          quantity,
          company_size: companySize,
        }),
      });
      clearInterval(iv);
      // Check if backend returned an API-level error inside results
      const raw = data.results || [];
      const apiError = raw.find(r => r.error);
      if (apiError) {
        setResults([]);
        setProgress(100);
        setProgressStep(PROGRESS_STEPS.length - 1);
        setTimeout(() => { setPhase("results"); setScrapeError(apiError.error); }, 600);
      } else {
        const mapped = raw.map((r, i) => ({ ...r, id: i + 1 }));
        setResults(mapped);
        setScrapeError("");
        setProgress(100);
        setProgressStep(PROGRESS_STEPS.length - 1);
        setTimeout(() => setPhase("results"), 600);
      }
    } catch (err) {
      clearInterval(iv);
      setResults([]);
      setScrapeError(err.message || "Scrape failed");
      setProgress(100);
      setProgressStep(PROGRESS_STEPS.length - 1);
      setTimeout(() => setPhase("results"), 600);
    }
  };

  const toggleAll    = () => setSelectedLeads(s => s.size === results.length ? new Set() : new Set(results.map(r => r.id)));
  const saveSelected = async () => {
    const toSave = results.filter(r => selectedLeads.has(r.id));

        apiFetch("/api/leads", {
          method: "POST",
          body: JSON.stringify({
            company_name:  r.company_name,
            email:         r.email || "",
            phone:         r.phone || "",
            website:       r.website || "",
            city:          r.city   || location.trim(),
            industry:      r.industry || industryInput.trim(),
            source_search: r.source_search || `${industryInput} in ${location}`,
            status:        "Not Contacted",
          }),
        })
      ));
      setSavedLeads(s => new Set([...s, ...selectedLeads]));
      setSelectedLeads(new Set());
    } catch (err) {
      alert("Failed to save leads: " + err.message);
    }

      </div>

          <div className="w-7 h-7 rounded-lg bg-blue-100 flex items-center justify-center flex-shrink-0">
            <Icon name="search" className="w-3.5 h-3.5 text-blue-600" />
          </div>
          <div>
            <p className="text-sm font-semibold text-slate-800">What are you looking for?</p>
            <p className="text-xs text-slate-400 mt-0.5">Define the business type and location</p>
          </div>
        </div>
        <div className="p-5 space-y-4">
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Business Type / Niche</label>
            <div className="relative">
              <input
                value={industryInput}
                onChange={e => { setIndustryInput(e.target.value); setShowDropdown(true); }}
                onFocus={() => setShowDropdown(true)}
                onBlur={() => setTimeout(() => setShowDropdown(false), 150)}
                className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-700 bg-slate-50 outline-none focus:border-blue-400 focus:bg-white transition-colors pr-8"
                placeholder="Type or select: Roofing, HVAC, Plumbing…"
              />
              <Icon name="chevronRight" className="w-4 h-4 text-slate-400 absolute right-3 top-3 rotate-90 pointer-events-none" />
              {showDropdown && filteredIndustries.length > 0 && (
                <div className="absolute z-30 top-full left-0 right-0 mt-1 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden max-h-48 overflow-y-auto">
                  {filteredIndustries.map(ind => (
                    <button key={ind} onMouseDown={() => { setIndustryInput(ind); setShowDropdown(false); }}
                      className={`w-full text-left px-4 py-2.5 text-sm transition-colors hover:bg-blue-50 hover:text-blue-700 ${industryInput === ind ? "bg-blue-50 text-blue-700 font-semibold" : "text-slate-700"}`}>
                      {ind}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div className="sm:col-span-2">
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">City / Area</label>
              <input value={location} onChange={e => setLocation(e.target.value)}

                <option value="10km">10 km</option>

                <option value="100km">100 km</option>
              </select>

        </div>

      {/* ── Section 2: Lead Criteria ── */}

  if (phase === "scraping") return (

          <Icon name="search" className="w-7 h-7 text-blue-600" />
          {progress < 100 && <div className="absolute -top-1 -right-1 w-3.5 h-3.5 bg-blue-500 rounded-full animate-ping opacity-75" />}
        </div>
        <h2 className="text-lg font-bold text-slate-800">Scraping in progress…</h2>
        <p className="text-sm text-slate-500 mt-1">
          <span className="font-medium text-slate-700">{industryInput}</span> businesses near <span className="font-medium text-slate-700">{location}</span>
        </p>
      </div>
      <div className="w-full space-y-2.5">
        <div className="flex justify-between text-xs font-semibold">
          <span className="text-slate-600">{PROGRESS_STEPS[progressStep]}</span>
          <span className={progress === 100 ? "text-emerald-600" : "text-blue-600"}>{progress}%</span>
        </div>
        <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
          <div className="h-3 rounded-full bg-gradient-to-r from-blue-500 to-blue-600 transition-all duration-200" style={{width:`${progress}%`}} />
        </div>
        <div className="flex flex-wrap gap-2 pt-1">
          {PROGRESS_STEPS.slice(0,-1).map((step, i) => (
            <span key={step} className={`text-xs px-2.5 py-1 rounded-lg font-medium transition-colors ${i < progressStep ? "bg-emerald-100 text-emerald-700" : i === progressStep ? "bg-blue-100 text-blue-700" : "bg-slate-100 text-slate-400"}`}>
              {i < progressStep ? "✓ " : ""}{step}
            </span>
          ))}
        </div>
      </div>
    </div>
  );

  /* ── RESULTS ──────────────────────────────────────────────────── */
  const allSel = results.length > 0 && selectedLeads.size === results.length;
  return (
    <div className="p-6 space-y-5 max-w-5xl">
      <div className="flex items-center justify-between gap-4">
        <div>
          <h2 className="text-xl font-bold text-slate-800">
            {scrapeError ? "Search failed" : `${results.length} leads found`}
          </h2>
          <p className="text-sm text-slate-500 mt-0.5">{industryInput} · {location} · {radius}</p>
        </div>
        <button onClick={() => { setPhase("form"); setSelectedLeads(new Set()); setSavedLeads(new Set()); setResults([]); setScrapeError(""); }}
          className="text-xs font-semibold text-slate-600 border border-slate-200 rounded-xl px-4 py-2 hover:bg-slate-50 bg-white transition-colors flex-shrink-0">
          ← New Search
        </button>
      </div>

      {/* API error banner */}
      {scrapeError && (
        <div className="bg-red-50 border border-red-200 rounded-2xl p-5 flex gap-4 items-start">
          <div className="w-8 h-8 bg-red-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <span className="text-red-500 text-base">⚠️</span>
          </div>
          <div>
            <p className="font-semibold text-red-800 text-sm">Search error</p>
            <p className="text-red-600 text-sm mt-1">{scrapeError}</p>
            {scrapeError.includes("customsearch.googleapis.com") && (
              <a href={scrapeError.match(/https:\/\/\S+/)?.[0]} target="_blank" rel="noreferrer"
                className="inline-block mt-2 text-xs font-semibold text-blue-600 hover:underline">
                Open Google Cloud Console →
              </a>
            )}
          </div>
        </div>
      )}

      {/* Empty state (no error, just no results) */}
      {!scrapeError && results.length === 0 && (
        <div className="bg-white border border-slate-100 rounded-2xl p-10 text-center shadow-sm">
          <div className="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-3">
            <Icon name="search" className="w-6 h-6 text-slate-400" />
          </div>
          <p className="font-semibold text-slate-700">No leads found</p>
          <p className="text-sm text-slate-400 mt-1">Try a broader industry term or different location.</p>
        </div>
      )}

      {/* Summary pills */}
      {results.length > 0 && (
        <div className="flex flex-wrap gap-2">
          <span className="text-xs font-semibold bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg">{results.filter(r=>r.has_email).length} with email</span>
          <span className="text-xs font-semibold bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-lg">{results.filter(r=>r.has_phone).length} with phone</span>
          <span className="text-xs font-semibold bg-amber-50 text-amber-700 px-3 py-1.5 rounded-lg">{results.filter(r=>!r.has_website).length} no website</span>
          {savedLeads.size > 0 && <span className="text-xs font-semibold bg-slate-800 text-white px-3 py-1.5 rounded-lg">{savedLeads.size} saved</span>}
        </div>
      )}

      {/* Results table */}
      {results.length > 0 && <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div className="flex items-center gap-3 px-5 py-3 bg-slate-50 border-b border-slate-100">
          <div onClick={toggleAll}
            className={`w-4 h-4 rounded border flex items-center justify-center cursor-pointer flex-shrink-0 transition-colors ${allSel ? "bg-blue-600 border-blue-600" : "border-slate-300 bg-white hover:border-blue-400"}`}>
            {allSel && <Icon name="check" className="w-2.5 h-2.5 text-white" />}
          </div>
          <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider flex-1">Company</span>
          <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider w-44 hidden md:block">Contact Info</span>
          <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider w-32 hidden lg:block">Source</span>
        </div>
        <div className="divide-y divide-slate-50">
          {results.map(r => {
            const isSaved = savedLeads.has(r.id);
            const isSel   = selectedLeads.has(r.id);
            return (
              <div key={r.id} className={`flex items-start gap-3 px-5 py-4 transition-colors ${isSel ? "bg-blue-50/40" : "hover:bg-slate-50/70"}`}>
                <div onClick={() => !isSaved && toggleSelect(r.id)}
                  className={`w-4 h-4 rounded border flex items-center justify-center flex-shrink-0 mt-0.5 transition-colors ${isSaved ? "bg-emerald-100 border-emerald-300 cursor-default" : isSel ? "bg-blue-600 border-blue-600 cursor-pointer" : "border-slate-300 bg-white cursor-pointer hover:border-blue-400"}`}>
                  {(isSel || isSaved) && <Icon name="check" className="w-2.5 h-2.5 text-white" />}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-start gap-2">
                    <div className="w-7 h-7 bg-slate-100 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5">
                      <Icon name="building" className="w-3.5 h-3.5 text-slate-500" />
                    </div>
                    <div>
                      <p className="text-sm font-semibold text-slate-800">{r.company_name}</p>
                      <p className="text-xs text-slate-400 mt-0.5">{r.city}</p>
                    </div>
                  </div>
                </div>
                <div className="w-44 hidden md:flex flex-col gap-0.5 flex-shrink-0">
                  {r.email ? <span className="text-xs text-slate-600 flex items-center gap-1"><Icon name="mail" className="w-3 h-3 text-slate-400 flex-shrink-0"/>{r.email}</span>
                    : <span className="text-xs text-slate-300">No email</span>}
                  {r.phone ? <span className="text-xs text-slate-600 flex items-center gap-1"><Icon name="phone" className="w-3 h-3 text-slate-400 flex-shrink-0"/>{r.phone}</span>
                    : <span className="text-xs text-slate-300">No phone</span>}
                  {r.website && <span className="text-xs text-blue-500 truncate">{r.website.replace(/^https?:\/\//,"").slice(0,30)}</span>}
                </div>
                <div className="w-32 hidden lg:block flex-shrink-0">
                  <span className="text-xs bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">{r.industry}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>}

      {/* Save Selected footer */}
      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex items-center justify-between gap-4">
        <div className="text-sm text-slate-600">
          {selectedLeads.size > 0
            ? <><span className="font-bold text-slate-800">{selectedLeads.size}</span> lead{selectedLeads.size !== 1 ? "s" : ""} selected</>
            : <span className="text-slate-400">Select leads above to save them</span>}
        </div>
        <div className="flex items-center gap-2">
          {selectedLeads.size > 0 && (
            <button onClick={() => setSelectedLeads(new Set())}
              className="text-xs font-medium text-slate-500 hover:text-slate-700 px-3 py-2 rounded-lg hover:bg-slate-100 transition-colors">
              Deselect all
            </button>
          )}
          <button onClick={saveSelected} disabled={selectedLeads.size === 0}
            className="flex items-center gap-2 bg-blue-600 disabled:bg-slate-100 disabled:text-slate-400 text-white font-semibold text-sm px-5 py-2.5 rounded-xl hover:bg-blue-700 disabled:cursor-not-allowed transition-colors shadow-sm shadow-blue-100 disabled:shadow-none">
            <Icon name="check" className="w-4 h-4" />
            Save Selected
          </button>
          {savedLeads.size > 0 && selectedLeads.size === 0 && savedLeads.size < results.length && (
            <button onClick={async () => { setSelectedLeads(new Set(results.map(r => r.id))); }}
              className="text-xs font-medium text-slate-500 hover:text-slate-700 px-3 py-2 rounded-lg hover:bg-slate-100 transition-colors">
              Save all
            </button>
          )}
          {results.length > 0 && savedLeads.size === results.length && (
            <span className="text-xs font-semibold text-emerald-600 flex items-center gap-1.5"><Icon name="check" className="w-3 h-3"/>All saved!</span>
          )}
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════════════════════
   LOGIN PAGE
═══════════════════════════════════════════════════════════════════════════ */
const LoginWrap = ({ children }) => (
  <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
    <div className="absolute inset-0 overflow-hidden pointer-events-none">
      <div className="absolute -top-40 -right-40 w-96 h-96 bg-blue-600 opacity-10 rounded-full blur-3xl" />
      <div className="absolute -bottom-40 -left-40 w-96 h-96 bg-violet-600 opacity-10 rounded-full blur-3xl" />
    </div>
    <div className="w-full max-w-sm relative">
      <div className="text-center mb-8">
        <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-900/50">
          <Icon name="trending" className="w-6 h-6 text-white" />
        </div>
        <h1 className="text-2xl font-bold text-white">LeadFlow</h1>
        <p className="text-slate-400 text-sm mt-1">Sales Intelligence Platform</p>
      </div>
      {children}
      <p className="text-center text-xs text-slate-600 mt-6">© 2026 LeadFlow, Inc. All rights reserved.</p>
    </div>
  </div>
);

const LoginErrBox = ({ msg }) => msg ? (
  <div className="bg-red-900/40 border border-red-700 text-red-300 text-xs px-3 py-2 rounded-lg">{msg}</div>
) : null;

const Login = ({ onLogin }) => {
  const [resetToken] = useState(() => {
    const hash = new URLSearchParams(window.location.hash.slice(1));
    return hash.get("type") === "recovery" ? hash.get("access_token") : null;
  });

  // view: 'role' | 'login' | 'signup' | 'signup-sent' | 'forgot' | 'forgot-sent' | 'reset' | 'reset-done'
  const [view, setView] = useState(resetToken ? "reset" : "role");
  const [loginRole, setLoginRole] = useState("admin"); // "admin" | "rep"

  const [error, setError] = useState("");

  // Login
  const [email, setEmail]             = useState("");
  const [password, setPassword]       = useState("");
  const [showPw, setShowPw]           = useState(false);
  const [loginLoading, setLoginLoading] = useState(false);

  // Sign up
  const [suName, setSuName]           = useState("");
  const [suEmail, setSuEmail]         = useState("");
  const [suPw, setSuPw]               = useState("");
  const [suPw2, setSuPw2]             = useState("");
  const [suShowPw, setSuShowPw]       = useState(false);
  const [signupLoading, setSignupLoading] = useState(false);
  const [suOrgMode, setSuOrgMode]     = useState("join");   // "create" | "join"
  const [suOrgName, setSuOrgName]     = useState("");
  const [suInviteCode, setSuInviteCode] = useState("");

  // Forgot
  const [forgotEmail, setForgotEmail]     = useState("");
  const [forgotLoading, setForgotLoading] = useState(false);

  // Reset
  const [newPw, setNewPw]             = useState("");
  const [confirmPw, setConfirmPw]     = useState("");
  const [resetLoading, setResetLoading] = useState(false);

  const goTo = (v) => { setError(""); setView(v); };

  const handleGoogle = async () => {
    try {
      const data = await apiFetch("/api/auth/oauth/google-url");
      window.location.href = data.url;
    } catch { setError("Could not start Google sign-in"); }
  };

  /* ── Login ── */
  const handleLogin = async (e) => {
    e.preventDefault();
    setError("");
    setLoginLoading(true);
    try {
      const data = await apiFetch("/api/auth/login", {
        method: "POST", body: JSON.stringify({ email, password }),
      });
      localStorage.setItem("lf_token", data.token);
      localStorage.setItem("lf_user", JSON.stringify(data.user));
      onLogin(data.user);
    } catch (err) {
      const msg = err.message || "Login failed";
      setError(
        msg === "Failed to fetch"    ? "Cannot reach server — run: python3 app.py" :
        msg === "PENDING_APPROVAL"   ? "Your account is pending admin approval. You'll be notified once approved." :
        msg === "REJECTED"           ? "Your join request was declined. Contact the admin for more information." :
        msg.includes("not confirmed")? "Please confirm your email before signing in." :
        msg
      );
    } finally { setLoginLoading(false); }
  };

  /* ── Sign up ── */
  const handleSignup = async (e) => {
    e.preventDefault();
    if (suPw !== suPw2) { setError("Passwords don't match"); return; }
    if (suPw.length < 8) { setError("Password must be at least 8 characters"); return; }
    setError("");
    setSignupLoading(true);
    try {
      await apiFetch("/api/auth/register", {
        method: "POST", body: JSON.stringify({
          name: suName, email: suEmail, password: suPw,
          ...(suOrgMode === "create" ? { org_name: suOrgName } : { invite_code: suInviteCode }),
        }),
      });
      goTo("signup-sent");
    } catch (err) {
      setError(err.message || "Sign up failed");
    } finally { setSignupLoading(false); }
  };

  /* ── Forgot ── */
  const handleForgot = async (e) => {
    e.preventDefault();
    setForgotLoading(true);
    setError("");
    try {
      await apiFetch("/api/auth/forgot-password", {
        method: "POST", body: JSON.stringify({ email: forgotEmail }),
      });
      goTo("forgot-sent");
    } catch (err) {
      setError(err.message || "Failed to send reset email");
    } finally { setForgotLoading(false); }
  };

  /* ── Reset ── */
  const handleReset = async (e) => {
    e.preventDefault();
    if (newPw !== confirmPw) { setError("Passwords don't match"); return; }
    if (newPw.length < 8)    { setError("Password must be at least 8 characters"); return; }
    setError("");
    setResetLoading(true);
    try {
      await apiFetch("/api/auth/reset-password", {
        method: "POST", body: JSON.stringify({ access_token: resetToken, new_password: newPw }),
      });
      window.history.replaceState(null, "", window.location.pathname);
      goTo("reset-done");
    } catch (err) {
      setError(err.message || "Failed to reset password");
    } finally { setResetLoading(false); }
  };

  const GoogleBtn = () => (
    <button type="button" onClick={handleGoogle}
      className="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-50 text-gray-700 font-medium text-sm py-2.5 rounded-xl border border-gray-200 transition-colors shadow-sm">
      <svg className="w-4 h-4" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  );

  const PwInput = ({ value, onChange, show, onToggle, placeholder = "Min. 8 characters" }) => (
    <div className="relative">
      <input type={show ? "text" : "password"} value={value} onChange={onChange} required minLength={8}
        className="w-full bg-slate-900 border border-slate-700 text-white placeholder:text-slate-600 rounded-xl px-4 py-2.5 pr-10 text-sm outline-none focus:border-blue-500 transition-colors"
        placeholder={placeholder} />
      <button type="button" onClick={onToggle}
        className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
        <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          {show
            ? <path strokeLinecap="round" strokeLinejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21" />
            : <><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></>
          }
        </svg>
      </button>
    </div>
  );

  /* ── Sign-up sent ── */
  if (view === "signup-sent") return (
    <LoginWrap>
      <div className="bg-slate-800 border border-slate-700 rounded-2xl p-7 shadow-2xl text-center">
        <div className="w-12 h-12 bg-emerald-600/20 rounded-full flex items-center justify-center mx-auto mb-4">
          <Icon name="mail" className="w-6 h-6 text-emerald-400" />
        </div>
        <h2 className="text-lg font-bold text-white mb-2">{suOrgMode === "join" ? "Request submitted!" : "Confirm your email"}</h2>
        <p className="text-slate-400 text-sm mb-6">
          {suOrgMode === "join"
            ? <>Your request to join the team has been sent to <span className="text-white font-medium">{suEmail}</span>. The admin will review and approve your account — you'll be able to sign in once approved.</>
            : <>We sent a confirmation link to <span className="text-white font-medium">{suEmail}</span>.<br/>Click it to activate your account.</>
          }
        </p>
        <button onClick={() => goTo("login")}
          className="w-full bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm font-medium py-2.5 rounded-xl transition-colors">
          Back to sign in
        </button>
      </div>
    </LoginWrap>
  );

  /* ── Forgot-sent ── */
  if (view === "forgot-sent") return (
    <LoginWrap>
      <div className="bg-slate-800 border border-slate-700 rounded-2xl p-7 shadow-2xl text-center">
        <div className="w-12 h-12 bg-emerald-600/20 rounded-full flex items-center justify-center mx-auto mb-4">
          <Icon name="mail" className="w-6 h-6 text-emerald-400" />
        </div>
        <h2 className="text-lg font-bold text-white mb-2">Check your email</h2>
        <p className="text-slate-400 text-sm mb-6">
          A password reset link was sent to <span className="text-white font-medium">{forgotEmail}</span>
        </p>
        <button onClick={() => goTo("login")}
          className="w-full bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm font-medium py-2.5 rounded-xl transition-colors">
          Back to sign in
        </button>
      </div>
    </LoginWrap>
  );

  /* ── Forgot form ── */
  if (view === "forgot") return (
    <LoginWrap>
      <div className="bg-slate-800 border border-slate-700 rounded-2xl p-7 shadow-2xl">
        <button onClick={() => goTo("login")} className="flex items-center gap-1 text-slate-400 hover:text-white text-xs mb-5 transition-colors">
          ← Back to sign in
        </button>
        <h2 className="text-lg font-bold text-white mb-1">Reset your password</h2>
        <p className="text-slate-400 text-sm mb-6">Enter your email and we'll send a reset link</p>
        <form onSubmit={handleForgot} className="space-y-4">
          <div>
            <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Email</label>
            <input type="email" value={forgotEmail} onChange={e => setForgotEmail(e.target.value)} required autoFocus
              className="w-full bg-slate-900 border border-slate-700 text-white placeholder:text-slate-600 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
              placeholder="you@company.com" />
          </div>
          <LoginErrBox msg={error} />
          <button type="submit" disabled={forgotLoading}
            className="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-60 text-white font-semibold text-sm py-2.5 rounded-xl transition-colors shadow-lg shadow-blue-900/30">
            {forgotLoading ? "Sending…" : "Send reset link"}
          </button>
        </form>
      </div>
    </LoginWrap>
  );

  /* ── Reset form ── */
  if (view === "reset") return (
    <LoginWrap>
      <div className="bg-slate-800 border border-slate-700 rounded-2xl p-7 shadow-2xl">
        <h2 className="text-lg font-bold text-white mb-1">Set new password</h2>
        <p className="text-slate-400 text-sm mb-6">Choose a strong password for your account</p>
        <form onSubmit={handleReset} className="space-y-4">
          <div>
            <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">New Password</label>
            <PwInput value={newPw} onChange={e => setNewPw(e.target.value)} show={false} onToggle={() => {}} placeholder="Min. 8 characters" />
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Confirm Password</label>
            <input type="password" value={confirmPw} onChange={e => setConfirmPw(e.target.value)} required
              className="w-full bg-slate-900 border border-slate-700 text-white placeholder:text-slate-600 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
              placeholder="••••••••" />
          </div>
          <LoginErrBox msg={error} />
          <button type="submit" disabled={resetLoading}
            className="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-60 text-white font-semibold text-sm py-2.5 rounded-xl transition-colors shadow-lg shadow-blue-900/30">
            {resetLoading ? "Updating…" : "Update password"}
          </button>
        </form>
      </div>
    </LoginWrap>
  );

  /* ── Reset done ── */
  if (view === "reset-done") return (
    <LoginWrap>
      <div className="bg-slate-800 border border-slate-700 rounded-2xl p-7 shadow-2xl text-center">
        <div className="w-12 h-12 bg-emerald-600/20 rounded-full flex items-center justify-center mx-auto mb-4">
          <Icon name="check" className="w-6 h-6 text-emerald-400" />
        </div>
        <h2 className="text-lg font-bold text-white mb-2">Password updated</h2>
        <p className="text-slate-400 text-sm mb-6">Sign in with your new password below.</p>
        <button onClick={() => goTo("login")}
          className="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm py-2.5 rounded-xl transition-colors">
          Sign in
        </button>
      </div>
    </LoginWrap>
  );

  /* ── Sign up ── */
  if (view === "signup") return (
    <LoginWrap>
      <div className="bg-slate-800 border border-slate-700 rounded-2xl p-7 shadow-2xl">
        <h2 className="text-lg font-bold text-white mb-1">Create an account</h2>
        <p className="text-slate-400 text-sm mb-5">Get started with LeadFlow</p>

        <GoogleBtn />
        <div className="flex items-center gap-3 my-4">
          <div className="flex-1 h-px bg-slate-700" />
          <span className="text-xs text-slate-500">or</span>
          <div className="flex-1 h-px bg-slate-700" />
        </div>

        {/* Org mode toggle */}
        <div className="flex rounded-xl overflow-hidden border border-slate-700 mb-4">
          <button type="button" onClick={() => setSuOrgMode("join")}
            className={`flex-1 text-xs font-semibold py-2 transition-colors ${suOrgMode === "join" ? "bg-blue-600 text-white" : "bg-slate-900 text-slate-400 hover:text-slate-300"}`}>
            Join a team
          </button>
          <button type="button" onClick={() => setSuOrgMode("create")}
            className={`flex-1 text-xs font-semibold py-2 transition-colors ${suOrgMode === "create" ? "bg-blue-600 text-white" : "bg-slate-900 text-slate-400 hover:text-slate-300"}`}>
            Create a team
          </button>
        </div>

        <form onSubmit={handleSignup} className="space-y-3">
          <div>
            <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Full Name</label>
            <input type="text" value={suName} onChange={e => setSuName(e.target.value)} required
              className="w-full bg-slate-900 border border-slate-700 text-white placeholder:text-slate-600 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
              placeholder="Jane Smith" />
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Email</label>
            <input type="email" value={suEmail} onChange={e => setSuEmail(e.target.value)} required
              className="w-full bg-slate-900 border border-slate-700 text-white placeholder:text-slate-600 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
              placeholder="you@company.com" />
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
            <PwInput value={suPw} onChange={e => setSuPw(e.target.value)} show={suShowPw} onToggle={() => setSuShowPw(p => !p)} />
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Confirm Password</label>
            <input type="password" value={suPw2} onChange={e => setSuPw2(e.target.value)} required
              className="w-full bg-slate-900 border border-slate-700 text-white placeholder:text-slate-600 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
              placeholder="••••••••" />
          </div>

          {suOrgMode === "create" ? (
            <div>
              <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Team / Company Name</label>
              <input type="text" value={suOrgName} onChange={e => setSuOrgName(e.target.value)} required
                className="w-full bg-slate-900 border border-slate-700 text-white placeholder:text-slate-600 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
                placeholder="Acme Sales Co." />
            </div>
          ) : (
            <div>
              <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Invite Code</label>
              <input type="text" value={suInviteCode} onChange={e => setSuInviteCode(e.target.value.toUpperCase())} required
                className="w-full bg-slate-900 border border-slate-700 text-white placeholder:text-slate-600 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors font-mono tracking-widest"
                placeholder="A1B2C3D4" maxLength={8} />
              <p className="text-xs text-slate-500 mt-1">Ask your admin for the invite code.</p>
            </div>
          )}

          <LoginErrBox msg={error} />
          <button type="submit" disabled={signupLoading}
            className="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-60 text-white font-semibold text-sm py-2.5 rounded-xl transition-colors shadow-lg shadow-blue-900/30">
            {signupLoading ? "Creating account…" : suOrgMode === "create" ? "Create team & account" : "Join team"}
          </button>
        </form>
        <p className="text-center text-xs text-slate-500 mt-4">
          Already have an account?{" "}
          <button onClick={() => goTo("login")} className="text-blue-400 hover:text-blue-300 transition-colors">Sign in</button>
        </p>
      </div>
    </LoginWrap>
  );

  /* ── Role picker (first screen) ── */
  if (view === "role") return (
    <LoginWrap>
      <div className="space-y-3">
        <p className="text-center text-slate-300 text-base font-semibold mb-2">I am a…</p>
        <button onClick={() => { setLoginRole("admin"); goTo("login"); }}
          className="w-full bg-slate-800 border-2 border-blue-600 hover:border-blue-400 rounded-2xl p-6 flex items-center gap-4 transition-all hover:scale-[1.02] active:scale-[0.99]">
          <div className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center flex-shrink-0">
            <Icon name="settings" className="w-6 h-6 text-white" />
          </div>
          <div className="text-left">
            <p className="font-bold text-white text-base">Sales Admin</p>
            <p className="text-xs text-slate-400 mt-0.5">Manage your team, reps, and leads</p>
          </div>
          <Icon name="chevronRight" className="w-5 h-5 text-slate-500 ml-auto" />
        </button>
        <button onClick={() => { setLoginRole("rep"); goTo("login"); }}
          className="w-full bg-slate-800 border-2 border-violet-600 hover:border-violet-400 rounded-2xl p-6 flex items-center gap-4 transition-all hover:scale-[1.02] active:scale-[0.99]">
          <div className="w-12 h-12 bg-violet-600 rounded-xl flex items-center justify-center flex-shrink-0">
            <Icon name="user" className="w-6 h-6 text-white" />
          </div>
          <div className="text-left">
            <p className="font-bold text-white text-base">Sales Rep</p>
            <p className="text-xs text-slate-400 mt-0.5">Search leads and manage your pipeline</p>
          </div>
          <Icon name="chevronRight" className="w-5 h-5 text-slate-500 ml-auto" />
        </button>
        <p className="text-center text-xs text-slate-600 mt-4">
          New here?{" "}
          <button onClick={() => goTo("signup")} className="text-blue-400 hover:text-blue-300 transition-colors">Create an account</button>
        </p>
      </div>
    </LoginWrap>
  );

  /* ── Main login ── */
  const accentColor = loginRole === "admin" ? "bg-blue-600 hover:bg-blue-500 shadow-blue-900/30" : "bg-violet-600 hover:bg-violet-500 shadow-violet-900/30";
  return (
    <LoginWrap>
      <div className="bg-slate-800 border border-slate-700 rounded-2xl p-7 shadow-2xl">
        <button onClick={() => goTo("role")} className="flex items-center gap-1 text-slate-400 hover:text-white text-xs mb-5 transition-colors">
          ← Back
        </button>

        <div className={`inline-flex items-center gap-2 px-3 py-1.5 rounded-lg mb-4 ${loginRole === "admin" ? "bg-blue-900/40 text-blue-300" : "bg-violet-900/40 text-violet-300"}`}>
          <Icon name={loginRole === "admin" ? "settings" : "user"} className="w-3.5 h-3.5" />
          <span className="text-xs font-semibold">{loginRole === "admin" ? "Sales Admin" : "Sales Rep"}</span>
        </div>

        <h2 className="text-lg font-bold text-white mb-1">Welcome back</h2>
        <p className="text-slate-400 text-sm mb-5">{loginRole === "admin" ? "Sign in to manage your team and leads" : "Sign in to view your leads and pipeline"}</p>

        <GoogleBtn />
        <div className="flex items-center gap-3 my-4">
          <div className="flex-1 h-px bg-slate-700" />
          <span className="text-xs text-slate-500">or</span>
          <div className="flex-1 h-px bg-slate-700" />
        </div>

        <form onSubmit={handleLogin} className="space-y-4">
          <div>
            <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Email</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} required autoFocus
              className="w-full bg-slate-900 border border-slate-700 text-white placeholder:text-slate-600 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
              placeholder="you@company.com" />
          </div>
          <div>
            <div className="flex items-center justify-between mb-1.5">
              <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
              <button type="button" onClick={() => { goTo("forgot"); setForgotEmail(email); }}
                className="text-xs text-blue-400 hover:text-blue-300 transition-colors">
                Forgot password?
              </button>
            </div>
            <PwInput value={password} onChange={e => setPassword(e.target.value)} show={showPw} onToggle={() => setShowPw(p => !p)} placeholder="••••••••" />
          </div>
          <LoginErrBox msg={error} />
          <button type="submit" disabled={loginLoading}
            className={`w-full disabled:opacity-60 text-white font-semibold text-sm py-2.5 rounded-xl transition-colors shadow-lg ${accentColor}`}>
            {loginLoading ? "Signing in…" : "Sign in"}
          </button>
        </form>

        <p className="text-center text-xs text-slate-500 mt-4">
          Don't have an account?{" "}
          <button onClick={() => goTo("signup")} className="text-blue-400 hover:text-blue-300 transition-colors">Sign up</button>
        </p>

      </div>
    </LoginWrap>
  );
};

/* ═══════════════════════════════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════════════════════════════ */
const ADMIN_NAV = [
  { id: "admin-dashboard",  label: "Dashboard",   icon: "grid"     },
  { id: "admin-reps",       label: "Sales Reps",  icon: "users"    },
  { id: "admin-leads",      label: "All Leads",   icon: "list" },
  { id: "admin-settings",   label: "Settings",    icon: "settings" },
];

const REP_NAV = [
  { id: "rep-dashboard", label: "My Dashboard", icon: "grid"   },
  { id: "rep-leads",     label: "My Leads",     icon: "list" },
  { id: "rep-search",    label: "Search Leads", icon: "search" },
];

const App = () => {
  const [currentUser, setCurrentUser] = useState(null);
  const [authReady,   setAuthReady]   = useState(false);
  const [page,    setPage]    = useState("admin-dashboard");
  const [repPage, setRepPage] = useState("rep-dashboard");

  // Handle OAuth redirect + verify token on mount
  useEffect(() => {
    const hash = new URLSearchParams(window.location.hash.slice(1));
    const oauthToken = hash.get("access_token");
    const type       = hash.get("type");
    if (oauthToken && type !== "recovery") {
      localStorage.setItem("lf_token", oauthToken);
      window.history.replaceState(null, "", window.location.pathname);
    }
    const token = localStorage.getItem("lf_token");
    if (!token) { setAuthReady(true); return; }
    apiFetch("/api/auth/me").then(u => {
      setCurrentUser(u);
      localStorage.setItem("lf_user", JSON.stringify(u));
    }).catch(() => {
      localStorage.removeItem("lf_token");
      localStorage.removeItem("lf_user");
    }).finally(() => setAuthReady(true));
  }, []);

  const handleLogin = (user) => {
    setCurrentUser(user);
    if (user.role === "admin") setPage("admin-dashboard");
    else setRepPage("rep-dashboard");
  };

  const handleLogout = () => {
    localStorage.removeItem("lf_token");
    localStorage.removeItem("lf_user");
    setCurrentUser(null);
  };

  // Show blank screen while checking token (prevents login-page flash on OAuth redirect)
  if (!authReady) return (
    <div className="min-h-screen bg-slate-900 flex items-center justify-center">
      <div className="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin" />
    </div>
  );

  if (!currentUser) return <Login onLogin={handleLogin} />;

  const initials = currentUser.name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
  const userBadge = {
    name:   currentUser.name,
    role:   currentUser.role === "admin" ? "Admin" : "Sales Rep",
    avatar: initials,
    color:  currentUser.role === "admin" ? "bg-blue-600" : "bg-violet-500",
  };

  if (currentUser.role === "admin") {
    const pageMap = {
      "admin-dashboard": <AdminDashboard />,
      "admin-reps":      <AdminSalesReps />,
      "admin-leads":     <AdminAllLeads />,
      "admin-settings":  <AdminSettings />,
    };
    const titles = {
      "admin-dashboard": "Overview",
      "admin-reps":      "Sales Reps",
      "admin-leads":     "All Leads",
      "admin-settings":  "Settings",
    };
    return (
      <div className="flex h-screen overflow-hidden bg-slate-50">
        <Sidebar nav={ADMIN_NAV} page={page} onNavigate={setPage} logoText="LeadFlow"
          bottomItems={[{ id: "logout", label: "Sign out", icon: "logout" }]} />
        <div className="flex-1 flex flex-col overflow-hidden">
          <TopBar title={titles[page] || "Dashboard"} user={userBadge} onLogout={handleLogout} />
          <main className="flex-1 overflow-y-auto">
            {page === "logout" ? handleLogout() : pageMap[page] || <AdminDashboard />}
          </main>
        </div>
      </div>
    );
  }

  // Sales Rep view
  const repPageMap = {
    "rep-dashboard": <RepDashboard user={currentUser} />,
    "rep-leads":     <RepMyLeads   user={currentUser} />,
    "rep-search":    <RepSearchLeads user={currentUser} />,
  };
  const repTitles = { "rep-dashboard": "My Dashboard", "rep-leads": "My Leads", "rep-search": "Search Leads" };
  return (
    <div className="flex h-screen overflow-hidden bg-slate-50">
      <Sidebar nav={REP_NAV} page={repPage}
        onNavigate={(id) => { if (id === "logout") handleLogout(); else setRepPage(id); }}
        logoText="LeadFlow" bottomItems={[{ id: "logout", label: "Sign out", icon: "logout" }]} />
      <div className="flex-1 flex flex-col overflow-hidden">
        <TopBar title={repTitles[repPage] || "My Dashboard"} user={userBadge} onLogout={handleLogout} />
        <main className="flex-1 overflow-y-auto">
          {repPageMap[repPage] || <RepDashboard user={currentUser} />}
        </main>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
